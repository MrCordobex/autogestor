name: Keep Alive Streamlit

on:
  schedule:
    # Cada 12 horas (suficiente para que no se duerma)
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping a la app de Streamlit
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" ${{ secrets.STREAMLIT_URL }}
          echo "✅ Ping enviado correctamente"
