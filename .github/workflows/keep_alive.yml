name: Keep Alive Streamlit

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Chromium
        run: |
          sudo apt-get update -q
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Selenium
        run: pip install selenium

      - name: Activar la app
        run: |
          python - <<'PYEOF'
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC

          opts = Options()
          opts.add_argument("--headless")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--disable-gpu")
          opts.binary_location = "/usr/bin/chromium-browser"

          service = Service("/usr/bin/chromedriver")
          driver  = webdriver.Chrome(service=service, options=opts)

          url = "${{ secrets.STREAMLIT_URL }}"
          print(f"Abriendo {url}...")
          driver.get(url)

          # Esperar hasta 30s a que aparezca el botón de wake up
          try:
              boton = WebDriverWait(driver, 30).until(
                  EC.element_to_be_clickable((By.XPATH, "//button[contains(text(), 'get this app back up')]"))
              )
              print("App dormida — haciendo clic en wake up...")
              boton.click()
              # Esperar a que arranque del todo
              time.sleep(30)
              print("App activada tras wake up")
          except Exception:
              # Si no aparece el botón, la app ya estaba activa
              print("App ya estaba activa, no había botón de wake up")

          print(f"Título final: {driver.title}")
          driver.quit()
          PYEOF